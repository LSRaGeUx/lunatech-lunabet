<!doctype html>
<html lang="{{ loc.code() }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LunaBet{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <!-- PWA: installable app with a per-tenant manifest + service worker. -->
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="{{ tenant.name }}">
    <script defer src="/static/pwa.js"></script>
    <!-- SEO: default to noindex (the app sits behind login); public pages opt in. -->
    <meta name="robots" content="{% block robots %}noindex, nofollow{% endblock %}">
    <meta name="description" content="{{ loc.f(
        "LunaBet : le jeu de pronostics entre collègues pour la Coupe du Monde 2026. Pronostique le score de chaque match, marque des points et grimpe au classement.",
        "LunaBet: the office prediction game for the 2026 FIFA World Cup. Predict the score of every match, score points and climb the leaderboard."
    ) }}">
    <meta name="theme-color" content="{{ tenant.primary_color }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="LunaBet">
    <meta property="og:title" content="{{ tenant.name }} · LunaBet">
    <meta property="og:description" content="{{ loc.f(
        "Pronostics entre collègues pour la Coupe du Monde 2026.",
        "Office predictions for the 2026 FIFA World Cup."
    ) }}">
    <meta property="og:locale" content="{% if loc.code() == "fr" %}fr_FR{% else %}en_US{% endif %}">
    <meta name="twitter:card" content="summary">
    {% block social_meta %}{% endblock %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --navy: {{ tenant.primary_color }};
            --red:  {{ tenant.accent_color }};
        }
    </style>
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
      }
    }
    </script>
    <script type="module" src="/static/ball.js"></script>
    <script defer src="/static/easter-eggs.js"></script>
    <script defer src="/static/timezone-converter.js"></script>
    <script defer src="/static/countdown.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">
            <canvas class="ball3d ball-mini" width="80" height="80" aria-hidden="true"></canvas>
            <span class="brand-name">LunaBet</span>
        </a>
        <nav>
            {% block nav %}{% endblock %}
            <span class="lang-switch">
                <a href="/lang/fr" class="lang-link{% if loc.code() == "fr" %} active{% endif %}">FR</a>
                <span class="lang-sep">|</span>
                <a href="/lang/en" class="lang-link{% if loc.code() == "en" %} active{% endif %}">EN</a>
            </span>
            <a class="lunatech-topbar" aria-label="{{ tenant.name }}">
                <img src="{{ tenant.logo_url_or_default() }}" alt="{{ tenant.name }}" height="32">
            </a>
        </nav>
    </header>
    <div class="pitch-stripe" aria-hidden="true"></div>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="pitch-footer">
        <div class="pitch-circle" aria-hidden="true"></div>
        <div class="pitch-line" aria-hidden="true"></div>
        <a class="lunatech-footer" aria-label="{{ tenant.name }}">
            <img src="{{ tenant.logo_url_or_default() }}" alt="{{ tenant.name }}" height="40">
        </a>
        <small>
            {{ loc.f("Coupe du Monde 2026", "FIFA World Cup 2026") }} ·
            {{ tenant.name }} ·
            <em>{{ loc.f("propulsé par LunaBet", "powered by LunaBet") }}</em>
        </small>
    </footer>
</body>
</html>
