<!doctype html>
<html lang="{{ loc.code() }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LunaBet · super-admin</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;0,700&display=swap">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">
            <span class="brand-name">LunaBet · super-admin</span>
        </a>
    </header>
    <div class="pitch-stripe" aria-hidden="true"></div>

    <main>
        <section class="card" style="max-width: 480px;">
            <h1 style="color: var(--red);">Super-admin</h1>
            <p style="font-style: italic; opacity: 0.75; margin-top: -0.4rem;">
                {{ loc.f("Accès réservé aux opérateurs de la plateforme.", "Reserved for platform operators.") }}
            </p>

            {% match error %}
                {% when Some with (msg) %}<p class="error">{{ msg }}</p>
                {% when None %}
            {% endmatch %}

            <form method="post" action="/super-admin/login" class="signup-form">
                <label>
                    Email
                    <input type="email" name="email" value="{{ prefilled_email }}"
                           required autofocus autocomplete="username">
                </label>
                <button class="btn" type="submit">
                    {{ loc.f("Recevoir le lien", "Send the link") }}
                </button>
            </form>
        </section>
    </main>

    <style>
        .signup-form { display: grid; gap: 1rem; margin-top: 1rem; }
        .signup-form label { display: flex; flex-direction: column; gap: 0.3rem; font-weight: 700; color: var(--navy); }
        .signup-form input[type=email] {
            font: inherit; padding: 0.55rem; border: 2px solid var(--ink);
            border-radius: 4px; background: var(--paper);
        }
    </style>
</body>
</html>
