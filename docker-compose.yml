services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lunatech_betting
    ports:
      - "5434:5432"
    volumes:
      # Postgres 18 images store data in a major-version subdirectory and expect
      # the mount at /var/lib/postgresql (not /var/lib/postgresql/data).
      - db_data:/var/lib/postgresql

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
